# CoRAG Cloud stack. Dev usage: docker compose up --build
# Pi + tunnel: add the overlays in deploy/cloudflare/ (see DEPLOY.md there).
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: corag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-corag_dev}
      CORAG_APP_DB_PASSWORD: ${CORAG_APP_DB_PASSWORD:-corag_app}
    command: postgres -c maintenance_work_mem=128MB
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./services/api/docker/postgres-init.sh:/docker-entrypoint-initdb.d/10-init.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d corag"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    working_dir: /app/services/api
    command: alembic upgrade head
    environment:
      DATABASE_ADMIN_URL: postgresql://postgres:${POSTGRES_PASSWORD:-corag_dev}@postgres:5432/corag
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql://corag_app:${CORAG_APP_DB_PASSWORD:-corag_app}@postgres:5432/corag
      DATABASE_ADMIN_URL: postgresql://postgres:${POSTGRES_PASSWORD:-corag_dev}@postgres:5432/corag
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-insecure-internal-token}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ./frontend
    environment:
      BACKEND_URL: http://api:8000
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-insecure-internal-token}
      AUTH_SECRET: ${AUTH_SECRET:-dev-insecure-auth-secret}
      AUTH_TRUST_HOST: "true"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
