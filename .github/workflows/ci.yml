name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[research,dev]"

    - name: Lint with ruff
      run: |
        ruff check src/ tests/

    - name: Check formatting with ruff
      run: |
        ruff format --check src/ tests/

    - name: Type check with mypy
      run: |
        mypy src/

    - name: Run tests with pytest
      run: |
        pytest --cov=corag --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  api-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: pip

    - name: Install corag (base) + corag-cloud
      run: |
        python -m pip install --upgrade pip
        pip install -e . -e "services/api[dev]"

    - name: Lint with ruff
      run: |
        ruff check services/api/src services/api/tests
        ruff format --check services/api/src services/api/tests

    - name: Type check with mypy
      run: |
        mypy services/api/src

    - name: Run tests
      working-directory: services/api
      run: |
        pytest tests

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm
        cache-dependency-path: frontend/pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Type check
      run: pnpm typecheck

    - name: Build
      run: pnpm build
